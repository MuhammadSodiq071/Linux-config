[cursor]
style = "Underline"
unfocused_hollow = true

[font]
size = 12

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Medium"

[font.bold]
family = "FiraCode Nerd Font"
style = "Bold"

[font.italic]
family = "FiraCode Nerd Font"
style = "Italic"

[font.bold_italic]
family = "FiraCode Nerd Font"
style = "BoldItalic"

[selection]
save_to_clipboard = true

[window]
opacity = 0.7

[window.padding]
x = 10
y = 10

[colors]
primary = { background = "#0a0909" }

